name: Fork Build APK

# Self-contained signed-APK build for this fork. Does not depend on upstream's
# reusable build-apk.yml. Requires these repository secrets:
#   GOOGLE_SERVICES_JSON       base64 of google-services.json (app id uk.co.pubinvest.smsgate)
#   SIGNING_KEY_STORE_BASE64   base64 of the signing keystore (.jks)
#   SIGNING_KEY_ALIAS          key alias
#   SIGNING_KEY_PASSWORD       key password
#   SIGNING_STORE_PASSWORD     keystore password

on:
  workflow_dispatch:
  push:
    branches: [master]

concurrency:
  group: fork-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JAVA 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Setup Google Services
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > ./app/google-services.json

      - name: Set app version
        run: |
          sed -i "s/versionName.*/versionName \"1.0.${{ github.run_number }}\"/" app/build.gradle
          sed -i "s/versionCode.*/versionCode $(( ( $(date +%s) - $(date -d '2022-06-15' +%s) ) / 86400 ))/" app/build.gradle

      - name: Decode keystore
        env:
          ENCODED_STRING: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
        run: echo "$ENCODED_STRING" | base64 --decode > app/keystore.jks

      - name: Test
        run: ./gradlew test

      - name: Build release APK & bundle
        env:
          SIGNING_KEY_STORE_PATH: app/keystore.jks
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            app/build/outputs/apk/release/
            app/build/outputs/bundle/release/
